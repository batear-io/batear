name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_run:
    workflows: ["ESP-IDF Build CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Download firmware for web flasher
        run: |
          API="https://api.github.com/repos/${{ github.repository }}/releases?per_page=30"
          for release in $(curl -s "$API" | python3 -c "
          import sys, json
          for r in json.load(sys.stdin):
              if any(a['name'].startswith('merged_') for a in r['assets']):
                  print(r['tag_name'])
          "); do
            mkdir -p "docs/flasher/firmware/$release"
            curl -sL "https://github.com/${{ github.repository }}/releases/download/$release/merged_detector.bin" \
              -o "docs/flasher/firmware/$release/merged_detector.bin" || true
            curl -sL "https://github.com/${{ github.repository }}/releases/download/$release/merged_gateway.bin" \
              -o "docs/flasher/firmware/$release/merged_gateway.bin" || true
            curl -sL "https://github.com/${{ github.repository }}/releases/download/$release/merged_wired_detector.bin" \
              -o "docs/flasher/firmware/$release/merged_wired_detector.bin" || true
          done

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
