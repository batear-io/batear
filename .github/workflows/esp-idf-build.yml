name: ESP-IDF Build CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build Batear Firmware
    runs-on: ubuntu-latest

    container: espressif/idf:release-v6.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Fix Git Directory Permissions
        run: git config --global --add safe.directory /__w/batear/batear

      # --- Build Detector Role ---
      - name: Build Detector
        run: |
          . $IDF_PATH/export.sh
          rm -rf build sdkconfig
          env SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.detector" idf.py set-target esp32s3
          idf.py build

      - name: Detector size
        id: detector_size
        run: |
          . $IDF_PATH/export.sh
          SIZE_OUTPUT=$(idf.py size 2>&1)
          TOTAL_LINE=$(echo "$SIZE_OUTPUT" | grep -E "^Total ")
          echo "total=$TOTAL_LINE" >> $GITHUB_OUTPUT

      - name: Merge Detector binary
        run: |
          . $IDF_PATH/export.sh
          esptool.py --chip esp32s3 merge_bin -o merged_detector.bin \
            --flash_mode dio --flash_size 8MB \
            0x0    build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/batear.bin

      # --- Build Gateway Role ---
      - name: Build Gateway
        run: |
          . $IDF_PATH/export.sh
          rm -rf build sdkconfig
          env SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.gateway" idf.py set-target esp32s3
          idf.py build

      - name: Gateway size
        id: gateway_size
        run: |
          . $IDF_PATH/export.sh
          SIZE_OUTPUT=$(idf.py size 2>&1)
          TOTAL_LINE=$(echo "$SIZE_OUTPUT" | grep -E "^Total ")
          echo "total=$TOTAL_LINE" >> $GITHUB_OUTPUT

      - name: Merge Gateway binary
        run: |
          . $IDF_PATH/export.sh
          esptool.py --chip esp32s3 merge_bin -o merged_gateway.bin \
            --flash_mode dio --flash_size 8MB \
            0x0    build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/batear.bin

      - name: Generate size report
        id: size_report
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CUR_DET=$(stat -c %s merged_detector.bin)
          CUR_GW=$(stat -c %s merged_gateway.bin)
          REPO="${{ github.repository }}"
          R=/tmp/size_report.md
          sign() { local v=$1; [ "$v" -gt 0 ] && echo "+${v}" || echo "${v}"; }

          echo "## Firmware Size Report" > "$R"
          echo "" >> "$R"

          if curl -sfL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
               "https://github.com/${REPO}/releases/download/firmware-latest/merged_detector.bin" \
               -o /tmp/prev_detector.bin && \
             curl -sfL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
               "https://github.com/${REPO}/releases/download/firmware-latest/merged_gateway.bin" \
               -o /tmp/prev_gateway.bin; then
            PREV_DET=$(stat -c %s /tmp/prev_detector.bin)
            PREV_GW=$(stat -c %s /tmp/prev_gateway.bin)
            DET_DELTA=$(sign $((CUR_DET - PREV_DET)))
            GW_DELTA=$(sign $((CUR_GW - PREV_GW)))
            echo "| Role | Current | Previous | Delta |" >> "$R"
            echo "|------|--------:|--------:|------:|" >> "$R"
            echo "| Detector | $CUR_DET B | $PREV_DET B | $DET_DELTA B |" >> "$R"
            echo "| Gateway | $CUR_GW B | $PREV_GW B | $GW_DELTA B |" >> "$R"
            echo "" >> "$R"
            echo "> Compared against [\`firmware-latest\`](https://github.com/${REPO}/releases/tag/firmware-latest)." >> "$R"
          else
            echo "| Role | Size |" >> "$R"
            echo "|------|-----:|" >> "$R"
            echo "| Detector | $CUR_DET B |" >> "$R"
            echo "| Gateway | $CUR_GW B |" >> "$R"
            echo "" >> "$R"
            echo "> No previous release found for comparison." >> "$R"
          fi

          echo "" >> "$R"
          echo "<details><summary>idf.py size details</summary>" >> "$R"
          echo "" >> "$R"
          echo "**Detector:** \`${{ steps.detector_size.outputs.total }}\`" >> "$R"
          echo "**Gateway:** \`${{ steps.gateway_size.outputs.total }}\`" >> "$R"
          echo "" >> "$R"
          echo "</details>" >> "$R"

          {
            echo "body<<ENDOFBODY"
            cat "$R"
            echo "ENDOFBODY"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with firmware sizes
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: ${{ steps.size_report.outputs.body }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            merged_detector.bin
            merged_gateway.bin

  release:
    name: Publish Firmware
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract tag annotation
        if: startsWith(github.ref, 'refs/tags/')
        id: tag_body
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          {
            echo "message<<ENDOFTAG"
            echo "$TAG_MSG"
            echo "ENDOFTAG"
          } >> "$GITHUB_OUTPUT"

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'firmware-latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Firmware' }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          body: ${{ startsWith(github.ref, 'refs/tags/') && steps.tag_body.outputs.message || 'Pre-built firmware binaries. Flash via the [Web Flasher](https://docs.batear.io/flasher/).' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: |
            merged_detector.bin
            merged_gateway.bin