## IDF Component Manager manifest for the Batear main component.
## Run `idf.py update-dependencies` after cloning to fetch RadioLib.

dependencies:
  idf: ">=5.0"

  espressif/esp-dsp:
    version: ">=1.4.0"

  ## RadioLib — SX1262 / LoRa driver (https://github.com/jgromes/RadioLib)
  ## Component registry: https://components.espressif.com/components/jgromes/radiolib
  jgromes/radiolib:
    version: ">=6.6.0"

  ## ESP-MQTT: built-in on ESP-IDF <=5.x, removed from core in v6.0.
  espressif/mqtt:
    version: "*"
    rules:
      - if: "idf_version >=6.0.0"

  ## W5500 SPI Ethernet: built-in on ESP-IDF <=5.x, split out in v6.0.
  espressif/w5500:
    version: ">=1.0.0"
    rules:
      - if: "idf_version >=6.0.0"

  ## TFLite Micro for ESP-IDF — used by audio_task to run the drone-detection
  ## CNN on detector / wired_detector roles. The component pulls in espressif/esp-nn
  ## (SIMD-optimised int8 kernels) automatically.
  ## Component registry: https://components.espressif.com/components/espressif/esp-tflite-micro
  espressif/esp-tflite-micro:
    version: "*"
